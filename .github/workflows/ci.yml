name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: "${{ github.workflow }} @ ${{ github.ref_name }}"
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    container:
      image: cgr.dev/chainguard/rust:latest-dev
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        shell: bash
        run: cargo fmt -- --check

  build:
    name: Build (Linux x86_64, GNU)
    runs-on: ubuntu-latest
    container:
      image: cgr.dev/chainguard/rust:latest-dev
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: ./.github/actions/install-clang

      - name: Build
        shell: bash
        run: cargo build --release

      - name: Verify no libonig dependency
        shell: bash
        run: |
          dynamic=$(readelf --dynamic target/release/cargo-spellcheck)
          echo "${dynamic}"
          if echo "${dynamic}" | grep -q libonig; then
            echo "ERROR: binary has a runtime dependency on libonig"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cargo-spellcheck-linux-x86_64
          path: target/release/cargo-spellcheck

  build-aarch64-linux:
    name: Build (Linux aarch64, GNU)
    runs-on: ubuntu-24.04-arm
    container:
      image: cgr.dev/chainguard/rust:latest-dev
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: ./.github/actions/install-clang

      - name: Build
        shell: bash
        run: cargo build --release

      - name: Verify no libonig dependency
        shell: bash
        run: |
          dynamic=$(readelf --dynamic target/release/cargo-spellcheck)
          echo "${dynamic}"
          if echo "${dynamic}" | grep -q libonig; then
            echo "ERROR: binary has a runtime dependency on libonig"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cargo-spellcheck-linux-aarch64
          path: target/release/cargo-spellcheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    container:
      image: cgr.dev/chainguard/rust:latest-dev
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: ./.github/actions/install-clang

      - name: Install english dictionary
        shell: bash
        run: apk add hunspell-dictionary-en

      - name: Run tests
        shell: bash
        run: cargo test --workspace

  build-win-aarch64:
    name: Build (Windows aarch64, MSVC)
    runs-on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        shell: pwsh
        run: cargo build --target aarch64-pc-windows-msvc

  build-win-x86_64:
    name: Build (Windows x86_64, MSVC)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        shell: pwsh
        run: cargo build --target x86_64-pc-windows-msvc

  validate-spellcheck:
    name: Validate spellcheck
    needs: build
    runs-on: ubuntu-latest
    container:
      image: cgr.dev/chainguard/rust:latest-dev
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Install oniguruma
        shell: bash
        run: apk add oniguruma-dev

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: cargo-spellcheck-linux-x86_64
          path: bin

      - name: Make executable
        shell: bash
        run: chmod +x bin/cargo-spellcheck

      - name: Run spellcheck validation
        shell: bash
        run: |
          EXE="bin/cargo-spellcheck"
          "${EXE}" --version
          "${EXE}" spellcheck demo/Cargo.toml
          "${EXE}" --dev-comments spellcheck demo/Cargo.toml
          "${EXE}" spellcheck demo/src/main.rs
          "${EXE}" --dev-comments spellcheck demo/src/main.rs
          "${EXE}" spellcheck demo/
          "${EXE}" --dev-comments spellcheck demo/
          "${EXE}" spellcheck
          "${EXE}" --dev-comments spellcheck
          "${EXE}"

  validate-reflow:
    name: Validate reflow
    needs: build
    runs-on: ubuntu-latest
    container:
      image: cgr.dev/chainguard/rust:latest-dev
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Install oniguruma
        shell: bash
        run: apk add oniguruma-dev

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: cargo-spellcheck-linux-x86_64
          path: bin

      - name: Make executable
        shell: bash
        run: chmod +x bin/cargo-spellcheck

      - name: Run reflow validation
        shell: bash
        run: |
          EXE="bin/cargo-spellcheck"
          "${EXE}" --version
          "${EXE}" reflow demo/Cargo.toml
          "${EXE}" reflow -vvvv demo/src/main.rs
          "${EXE}" reflow demo/
          "${EXE}" reflow demo/README.md
          "${EXE}"
